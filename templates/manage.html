<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quản lý sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
        }

        .header {
            background: #7ac943;
            padding: 15px 30px;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .card {
            border: none;
            border-radius: 12px;
        }

        .btn-main {
            background: #7ac943;
            color: white;
        }

        .btn-main:hover {
            background: #6bb63a;
            color: white;
        }

        .table img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>

</head>

<body>

    <div class="header">
        Fruitables Admin - Quản lý sản phẩm
    </div>

    <div class="container mt-4">

        <div class="card p-4">

            <div class="d-flex justify-content-between mb-3">
                <h4>Danh sách sản phẩm</h4>
                <button class="btn btn-main" data-bs-toggle="modal" data-bs-target="#addModal">
                    + Thêm sản phẩm
                </button>
            </div>

            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Ảnh</th>
                        <th>Tên</th>
                        <th>Giá</th>
                        <th>Danh mục</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>

                <tbody id="productTable">
                    <tr id="1">
                        <td>
                            <img src="https://images.unsplash.com/photo-1619566636858-adf3ef46400b">
                        </td>
                        <td>Táo đỏ</td>
                        <td>25000</td>
                        <td>Trái cây</td>
                        <td>
                            <button class="btn btn-danger btn-sm me-2" id="btn-delete"> Xóa </button>
                            <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#addModal"
                                id="btn-edit"> Sửa </button>
                        </td>
                    </tr>
                    <tr id="1">
                        <td>
                            <img src="https://images.unsplash.com/photo-1619566636858-adf3ef46400b">
                        </td>
                        <td>Táo đỏ</td>
                        <td>25000</td>
                        <td>Trái cây</td>
                        <td>
                            <button class="btn btn-danger btn-sm me-2" id="btn-delete"> Xóa </button>
                            <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#addModal"
                                id="btn-edit"> Sửa </button>
                        </td>
                    </tr>
                </tbody>

            </table>

        </div>
    </div>
    <div class="modal fade" id="addModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 id="modalTitle">Thêm sản phẩm</h5>
                </div>
                <div class="modal-body">
                    <input type="text" id="id" class="form-control mb-2" placeholder="Mã sản phẩm"
                        style="display: none;">
                    <input type="text" id="name" class="form-control mb-2" placeholder="Tên sản phẩm">
                    <input type="number" id="price" class="form-control mb-2" placeholder="Giá">
                    <input type="text" id="category" class="form-control mb-2" placeholder="Danh mục">
                    <input type="text" id="image" class="form-control mb-2" placeholder="Link ảnh">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button class="btn btn-main" onclick="saveProduct()">Lưu thông tin</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="js/manage.js"></script>
</body>

</html>
