<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - Fruitables</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="css/register.css" rel="stylesheet"></head>

</head>
<body>

    <div class="register-container">
        <a href="#" class="brand-logo">Fruitables</a>
        <h2>Tham gia cùng <span>Gia đình Organic</span></h2>

        <form>
            <div class="form-row">
                <div class="form-group">
                    <label>Họ</label>
                    <input type="text" placeholder="Nguyễn" required>
                </div>
                <div class="form-group">
                    <label>Tên</label>
                    <input type="text" placeholder="An" required>
                </div>
            </div>

            <div class="form-group">
                <label>Địa chỉ Email</label>
                <input type="email" placeholder="example@gmail.com" required>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" placeholder="Tối thiểu 8 ký tự" required>
            </div>

            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" placeholder="Nhập lại mật khẩu" required>
            </div>

            <div class="terms">
                <input type="checkbox" id="agree" required>
                <label for="agree">Tôi đồng ý với các Điều khoản & Chính sách</label>
            </div>

            <button type="submit" class="btn-register">Đăng Ký Tài Khoản</button>
        </form>
