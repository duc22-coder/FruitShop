<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Fruitables</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="css/account.css" rel="stylesheet"></head>
<body>

    <div class="login-container">
        <a href="#" class="brand-logo">Fruitables</a>
        <h2>Đăng Nhập Hệ Thống</h2>

        <form>
            <div class="form-group">
                <label>Email / Tên đăng nhập</label>
                <input type="text" placeholder="Nhập email của bạn..." required>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" placeholder="Nhập mật khẩu..." required>
            </div>

            <button type="submit" class="btn-login">Đăng Nhập Ngay</button>
        </form>

        <div class="extra-links">
            <a href="#">Quên mật khẩu?</a>
            <a href="register.html">Tạo tài khoản mới</a>
        </div>

        <a href="index.html" class="back-home">← Quay lại trang chủ</a>
    </div>

</body>
</html>
